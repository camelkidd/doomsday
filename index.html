<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="screen-difficulty" class="screen">
            <h1>Doomsday Trainer</h1>
            <p>Select your difficulty:</p>
            <button onclick="selectDifficulty('easy')">Easy (1)</button>
            <button onclick="selectDifficulty('medium')">Medium (2)</button>
            <button onclick="selectDifficulty('hard')">Hard (3)</button>
        </section>

        <section id="screen-settings" class="screen hidden">
            <h2 style="font-size: 2.5rem;">Game Settings</h2>
            
            <div class="settings-group">
                <label style="font-size: 1.5rem;">Number of Questions:</label>
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                    <input type="range" id="q-count" min="1" max="50" value="5" style="flex-grow: 1;">
                    <input type="number" id="q-input" min="1" max="50" value="5" 
                        style="width: 60px; font-size: 1.2rem; padding: 5px; background: #1a1a1a; color: white; border: 2px solid #555; border-radius: 4px;">
                </div>
            </div>
            
            <div class="vertical-stack">
                <label class="custom-checkbox">
                    <input type="checkbox" id="toggle-timer">
                    <span class="checkmark"></span> Enable Timer (T)
                </label>

                <p class="section-header">Century Selection</p>
                
                <label class="custom-checkbox">
                    <input type="checkbox" value="1700">
                    <span class="checkmark"></span> 18th Century (1700s)
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox" value="1800">
                    <span class="checkmark"></span> 19th Century (1800s)
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox" value="1900" checked>
                    <span class="checkmark"></span> 20th Century (1900s)
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox" value="2000" checked>
                    <span class="checkmark"></span> 21st Century (2000s)
                </label>
                <label class="custom-checkbox sub-option" id="present-only-container">
                    <input type="checkbox" id="toggle-present-only" checked>
                    <span class="checkmark"></span> Limit 2000s to present date
                </label>
                <label class="custom-checkbox disabled-option" id="label-2100">
                    <input type="checkbox" value="2100" id="check-2100">
                    <span class="checkmark"></span> 22nd Century (2100s)
                </label>
            </div>

            <div class="actions">
                <button onclick="startGame()" class="btn-large" id="starter">Start Game (Enter)</button>
                <button onclick="showScreen('screen-difficulty')" class="btn-secondary" style="font-size: 1.2rem;">Cancel (Esc)</button>
            </div>
        </section>

        <section id="screen-game" class="screen hidden">
            <h1 id="current-date-display"></h1>
            
            <div id="scratchpad-area" class="horizontal-stack"></div>

            <div class="final-container">
                <div class="input-block">
                    <label>Final Answer</label>
                    <input type="text" id="final-answer" placeholder="Enter day...">
                </div>
                <button id="btn-submit" onclick="submitAnswer()" class="btn-large">Submit (Enter)</button>
            </div>

            <div class="game-footer">
                <button id="btn-quit" onclick="confirmQuit()">Quit Game (Esc)</button>
                <div class="counter-container" style="text-align: right;">
                    <div id="attempt-counter" class="counter">Attempt: 1 / 3</div>
                    <div id="question-counter" class="counter">Question: 1 / 5</div>
                    <div id="timer-display" class="counter hidden">Time: 0:00</div>
                </div>
            </div>
        </section>

        <div id="modal-quit" class="modal hidden">
            <div class="modal-content fade-in">
                <h2>Quit Game?</h2>
                <p>Your progress will be lost.</p>
                <div class="modal-actions">
                    <button onclick="location.reload()" class="btn-danger">Yes, Quit (Enter)</button>
                    <button onclick="closeQuitModal()" class="btn-secondary">Cancel (Esc)</button>
                </div>
            </div>
        </div>

        <div id="modal-alert" class="modal hidden">
            <div class="modal-content fade-in">
                <h2 style="color: #ff5555;">Hold on!</h2>
                <p id="alert-message">Please select at least one century to continue.</p>
                <div class="modal-actions">
                    <button onclick="closeAlert()" class="btn-large">Got it (Enter)</button>
                </div>
            </div>
        </div>
        
        <div id="modal-feedback" class="modal hidden">
            <div class="modal-content" id="feedback-content" style="position: relative;">
                <button id="btn-review-x" onclick="toggleReviewMode()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 2rem; color: #777; cursor: pointer;">&times;</button>
                
                <h2 id="feedback-text"></h2>
                <button onclick="toggleBreakdown()" class="btn-secondary" id="btn-toggle-solution">Show Solution (Tab)</button>
                <div id="breakdown-container" class="hidden"></div>
                <hr>
                <div class="modal-actions" id="standard-actions">
                    <button id="btn-continue" onclick="nextQuestion()">Continue (Enter)</button>
                    <button id="btn-retry" onclick="retryQuestion()">Retry (Space)</button>
                    <button id="btn-override" onclick="overrideScore()" class="btn-secondary" style="background: #8b4513;">Override</button>
                </div>
            </div>

            <div id="review-actions" class="hidden" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 120;">
                <button onclick="toggleReviewMode()" class="btn-large">Return to Results</button>
                <button id="btn-override-review" onclick="overrideScore()" class="btn-secondary" style="background: #8b4513; font-size: 1.2rem; padding: 1rem 2rem;">Override</button>
            </div>
        </div>

        <section id="screen-results" class="screen hidden">
            <h2 id="results-header">Game Over</h2>

            <div id="final-results-container">
                <p id="final-score" style="font-size: 1.8rem; margin-bottom: 10px;"></p>
                <p id="final-time" style="font-size: 1.2rem; color: #00bcd4; line-height: 1.6;"></p>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn-large" onclick="location.reload()" style="width: 100%; max-width: 300px;">
                    Play Again (Enter)
                </button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
